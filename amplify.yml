version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - npm ci || npm install
        build:
          commands:
            - echo "VITE_SUPABASE_URL=$VITE_SUPABASE_URL" >> .env
            - echo "VITE_SUPABASE_ANON_KEY=$VITE_SUPABASE_ANON_KEY" >> .env
            - echo "VITE_EXCHANGE_RATE_API_KEY=$VITE_EXCHANGE_RATE_API_KEY" >> .env
            - npm run build
      artifacts:
        baseDirectory: dist
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
    appRoot: payroll-app
customHeaders:
  - pattern: '**/*'
    headers:
      - key: X-Frame-Options
        value: DENY
      - key: X-Content-Type-Options
        value: nosniff
      - key: X-XSS-Protection
        value: '1; mode=block'
      - key: Strict-Transport-Security
        value: 'max-age=31536000; includeSubDomains'
      - key: Referrer-Policy
        value: strict-origin-when-cross-origin
  - pattern: '/assets/*'
    headers:
      - key: Cache-Control
        value: 'public, max-age=31536000, immutable'
customRules:
  - source: '</^[^.]+$|\.(?!(css|gif|ico|jpg|jpeg|js|png|txt|svg|woff|woff2|ttf|map|json|webp)$)([^.]+$)/>'
    target: /index.html
    status: '200'
